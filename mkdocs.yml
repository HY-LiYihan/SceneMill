site_name: SceneMill
site_description: 面向机器人和 Isaac 的场景重建 pipeline。
site_url: https://hy-liyihan.github.io/SceneMill/
repo_name: HY-LiYihan/SceneMill
repo_url: https://github.com/HY-LiYihan/SceneMill
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: black
      accent: amber

plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: zh
          name: 简体中文
          default: true
          build: true
          site_name: SceneMill
          site_description: 面向机器人和 Isaac 的场景重建 pipeline。
          theme:
            language: zh
          nav_translations:
            Overview: 项目介绍
            Installation: 安装
            Quickstart: 快速开始
            Backend Selection: Backend 选择
            CLI Reference: CLI 参考
            Pipeline Concepts: Pipeline 概念
            Presets: 配置预设
            Manifest Contract: Manifest 契约
            AnySplat Low-View: AnySplat 低视角
            DA3 + 3DGUT + Isaac: DA3 + 3DGUT + Isaac
            image2sim Integration: image2sim 集成
            ROS Bag Ingest: ROS Bag 导入
            Isaac USDZ Validation: Isaac USDZ 验证
            Troubleshooting: 常见问题
            Development: 开发指南
        - locale: en
          name: English
          default: false
          build: true
          site_name: SceneMill
          site_description: Robot and Isaac-first scene reconstruction pipeline.
  - git-revision-date-localized:
      enabled: !ENV [SCENEMILL_DOCS_GIT_DATES, false]
      enable_creation_date: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true

nav:
  - Overview: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Backend Selection: backend-selection.md
  - CLI Reference: cli.md
  - Pipeline Concepts: concepts.md
  - Presets: presets.md
  - Manifest Contract: manifest.md
  - AnySplat Low-View: workflows/anysplat-low-view.md
  - DA3 + 3DGUT + Isaac: workflows/da3-3dgut-isaac.md
  - image2sim Integration: image2sim-integration.md
  - ROS Bag Ingest: rosbag.md
  - Isaac USDZ Validation: isaac-validation.md
  - Troubleshooting: troubleshooting.md
  - Development: development.md
