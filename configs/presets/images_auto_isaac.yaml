project:
  name: SceneMill

input:
  kind: images
  path:

sampling:
  preserve_filenames: true
  deduplicate: false

router:
  mode: auto
  low_view_threshold: 10
  low_view_backend: anysplat
  classic_backend: classic

anysplat:
  enabled: true
  root: third_party/anysplat
  conda_env: anysplat
  model_id: lhjiang/anysplat
  workspace_name: anysplat
  direct_single_image: true
  save_preview: false
  export_formats: [nurec, lightfield]
  apply_coordinate_transform: true
  lightfield_render_order_hint: cameraDistance
  linear_srgb: false

geometry:
  backend: da3
  model: depth-anything/DA3NESTED-GIANT-LARGE-1.1
  process_res: 504
  process_res_method: upper_bound_resize
  use_ray_pose: true

trainer:
  backend: 3dgrut
  config_name: apps/colmap_3dgut.yaml
  experiment_name: da3_3dgut_scene
  dataset_downsample_factor: 4
  max_colmap_points: 200000
  point_sample_seed: 42
  n_iterations: 30000

export:
  enabled: true
  formats: [nurec, lightfield]
  output_dir:

runtime:
  workspace: runs/images_auto_isaac
  da3_env: scenemill
  anysplat_env: anysplat
  grut_env: scenemill
  isaac_env: env_isaacsim
  da3_repo: third_party/Depth-Anything-3
  grut_repo: third_party/3dgrut
  run_dir:
  cuda:
    home: /usr/local/cuda-12.4
    arch_list: "8.6"
    cc: /usr/bin/gcc-11
    cxx: /usr/bin/g++-11

retry:
  frame_steps: [1, 2, 5, 10, 15, 20]

validation:
  enabled: true
  require_usdz_alignment: true
  require_isaac_prims: true
