project:
  name: SceneMill

input:
  kind: images
  path:
  image_topic:

sampling:
  preserve_filenames: true

geometry:
  backend: da3
  model: depth-anything/DA3NESTED-GIANT-LARGE-1.1
  process_res: 504
  process_res_method: upper_bound_resize
  use_ray_pose: true
  colmap_env:         # conda env name for colmap (used when backend=colmap)
  colmap_bin: colmap  # colmap executable path or name

trainer:
  backend: 3dgrut
  config_name: apps/colmap_3dgut.yaml
  experiment_name: da3_3dgut_scene
  dataset_downsample_factor: 1
  max_colmap_points:
  point_sample_seed: 42
  n_iterations: 30000
  optimizer_type:

export:
  enabled: true
  formats:
    - nurec
    - lightfield
  output_dir:

runtime:
  workspace: runs/scenemill_run
  da3_env: da3_recon
  grut_env: 3dgrut_recon
  isaac_env: env_isaacsim
  da3_repo: third_party/Depth-Anything-3
  grut_repo: third_party/3dgrut
  run_dir:
  cuda:
    home: /usr/local/cuda-12.4
    arch_list: "8.6"
    cc: /usr/bin/gcc-11
    cxx: /usr/bin/g++-11

retry:
  frame_steps: [1, 2, 5, 10, 15, 20]

validation:
  enabled: true
  require_usdz_alignment: true
  require_isaac_prims: true
